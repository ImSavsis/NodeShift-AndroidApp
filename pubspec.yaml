name: nodeshift_vpn
description: NodeShift VPN — быстрый и безопасный VPN
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── VPN core (Xray вшит внутрь) ──────────────────────────────────────────
  flutter_v2ray: ^1.0.10

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── HTTP & cookies ────────────────────────────────────────────────────────
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # ── Storage ───────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.2

  # ── State ─────────────────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── UI / animations ───────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  smooth_page_indicator: ^1.2.0

  # ── Utils ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
